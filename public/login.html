<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>TexlMaxima - Login</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="css/style.css">
</head>
<body class="min-h-screen bg-gradient-to-br from-indigo-900 via-purple-900 to-slate-900 flex items-center justify-center p-4">
  <div class="ambient-glow ambient-cyan"></div>
  <div class="ambient-glow ambient-magenta"></div>
  <div class="ambient-glow ambient-purple"></div>
  <div class="w-full max-w-md">
    <div class="text-center mb-8">
      <h1 class="text-4xl md:text-5xl font-bold gradient-text neon-glow" data-text="TexlMaxima">TexlMaxima</h1>
      <p class="text-slate-400 mt-2 text-sm md:text-base">Leasure Book System</p>
    </div>

    <div class="bg-white/10 backdrop-blur-xl rounded-2xl p-6 md:p-8 shadow-2xl border border-white/20">
      <h2 class="text-2xl font-semibold text-white mb-6 text-center">Welcome <span class="em-text">Back</span></h2>

      <div id="loginError" class="hidden bg-red-500/20 border border-red-400/30 text-red-300 px-4 py-3 rounded-lg mb-4 text-sm"></div>

      <form id="loginForm" class="space-y-5">
        <div>
          <label class="block text-slate-300 text-sm font-medium mb-2">Username</label>
          <input type="text" id="username" required
            class="w-full px-4 py-3 bg-white/5 border border-white/10 rounded-xl text-white placeholder-slate-500 focus:outline-none focus:border-cyan-400/50 focus:ring-2 focus:ring-cyan-400/20 transition-all">
        </div>
        <div>
          <label class="block text-slate-300 text-sm font-medium mb-2">Password</label>
          <input type="password" id="password" required
            class="w-full px-4 py-3 bg-white/5 border border-white/10 rounded-xl text-white placeholder-slate-500 focus:outline-none focus:border-cyan-400/50 focus:ring-2 focus:ring-cyan-400/20 transition-all">
        </div>
        <button type="submit"
          class="w-full py-3 px-6 btn-neon font-semibold rounded-xl shadow-lg transition-all duration-300 transform hover:scale-[1.02] active:scale-[0.98]">
          Sign In
        </button>
      </form>

      <p class="text-slate-500 text-xs text-center mt-6">Default admin: admin / admin123</p>
    </div>
  </div>

  <script>
    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value;
      const errorDiv = document.getElementById('loginError');

      try {
        const res = await fetch('/api/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, password })
        });
        const data = await res.json();
        if (!res.ok) {
          errorDiv.textContent = data.error || 'Login failed';
          errorDiv.classList.remove('hidden');
          return;
        }
        localStorage.setItem('token', data.token);
        localStorage.setItem('user', JSON.stringify(data.user));
        window.location.href = '/';
      } catch (err) {
        errorDiv.textContent = 'Connection error. Is the server running?';
        errorDiv.classList.remove('hidden');
      }
    });
  </script>
</body>
</html>
